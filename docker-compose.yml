version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: restaurant_ai
    ports:
      - "5432:5432"
    volumes:
      - restaurant_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d restaurant_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  restaurant_ai_pgdata:
