name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 with rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Restaurant-AI
            PREV_COMMIT=$(git rev-parse HEAD)
            git pull origin main
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env

            rollback() {
              echo "Rollback to $PREV_COMMIT"
              git checkout $PREV_COMMIT
              docker compose -f docker-compose.prod.yml up --build -d
              exit 1
            }

            docker compose -f docker-compose.prod.yml up --build -d || rollback

            sleep 15
            TOTAL=$(docker compose -f docker-compose.prod.yml ps --quiet | wc -l)
            RUNNING=$(docker compose -f docker-compose.prod.yml ps --status running --quiet | wc -l)
            [ "$TOTAL" -gt 0 ] && [ "$RUNNING" -eq "$TOTAL" ] || rollback

            docker image prune -f
